<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Panel de Administración</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" color="light">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="secondary" (click)="abrirFormulario()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-list *ngIf="!loading" class="ion-no-padding">
    <ion-list-header color="primary">
      <ion-label>{{ politicos.length }} Políticos Registrados</ion-label>
    </ion-list-header>

    <ion-item *ngFor="let politico of politicos" class="politico-item">
      <ion-avatar slot="start">
        <img
          [src]="politico.foto_url || 'assets/placeholder.png'"
          [alt]="politico.nombre"
        />
      </ion-avatar>
      <ion-label>
        <h2>{{ politico.nombre }} {{ politico.apellido }}</h2>
        <p>{{ politico.cargo_nombre }}</p>
        <p class="text-light">{{ politico.partido_nombre }}</p>
      </ion-label>
      <ion-button slot="end" fill="clear" color="primary" (click)="abrirFormulario(politico)">
        <ion-icon name="pencil" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <div *ngIf="loading" class="ion-text-center ion-padding">
    <ion-spinner color="primary"></ion-spinner>
  </div>

  <div *ngIf="!loading && politicos.length === 0" class="empty-state ion-text-center ion-padding">
    <ion-icon name="briefcase-outline"></ion-icon>
    <p>No hay políticos registrados</p>
    <p class="text-light">Haz clic en el + para crear uno</p>
  </div>
</ion-content>
