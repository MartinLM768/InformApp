<ion-header>
  <ion-toolbar color="primary">
    <ion-title>InformApp</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/login" color="light">
        <ion-icon name="settings-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Filtros -->
  <div class="filters-section ion-padding">
    <h3 class="ion-no-margin">Filtrar por cargo</h3>
    <ion-segment [(ngModel)]="cargosSeleccionado" (ionChange)="aplicarFiltro()">
      <ion-segment-button *ngFor="let cargo of cargos" [value]="cargo.value">
        {{ cargo.label }}
      </ion-segment-button>
    </ion-segment>
  </div>

  <!-- Grid de Políticos -->
  <div class="politicos-grid ion-padding">
    <ion-card
      *ngFor="let politico of politicosFiltered"
      (click)="abrirDetalle(politico)"
      class="politico-card"
    >
      <ion-card-header>
        <ion-avatar>
          <img
            [src]="politico.foto || 'assets/placeholder.png'"
            [alt]="politico.nombre"
          />
        </ion-avatar>
      </ion-card-header>

      <ion-card-content>
        <h3>{{ politico.nombre }} {{ politico.apellido }}</h3>
        <p class="cargo">{{ politico.cargo }}</p>
        <p class="partido">{{ politico.partido }}</p>

        <ion-button
          expand="block"
          color="primary"
          (click)="abrirDetalle(politico); $event.stopPropagation()"
        >
          <ion-icon name="eye-outline" slot="start"></ion-icon>
          Ver Perfil
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="ion-text-center ion-padding">
    <ion-spinner color="primary"></ion-spinner>
  </div>

  <!-- Empty State -->
  <div
    *ngIf="!loading && politicosFiltered.length === 0"
    class="empty-state ion-text-center ion-padding"
  >
    <ion-icon name="briefcase-outline"></ion-icon>
    <p>No hay políticos en esta categoría</p>
  </div>
</ion-content>
