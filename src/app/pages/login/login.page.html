<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Panel Administrador</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <h1>Acceso Administrador</h1>

    <ion-item fill="outline" class="ion-margin-bottom">
      <ion-label position="stacked">Usuario</ion-label>
      <ion-input
        [(ngModel)]="username"
        placeholder="Ingresa tu usuario"
        type="text"
        autocomplete="username"
      ></ion-input>
    </ion-item>

    <ion-item fill="outline" class="ion-margin-bottom">
      <ion-label position="stacked">Contraseña</ion-label>
      <ion-input
        [(ngModel)]="password"
        placeholder="Ingresa tu contraseña"
        type="password"
        autocomplete="current-password"
      ></ion-input>
    </ion-item>

    <ion-button expand="block" color="primary" (click)="login()" [disabled]="loading">
      <ion-spinner
        *ngIf="loading"
        name="crescent"
        color="light"
      ></ion-spinner>
      <span *ngIf="!loading">Entrar</span>
    </ion-button>

    <ion-text class="ion-text-center ion-margin-top">
      <p>
        <small>Credenciales por defecto: <strong>admin</strong> /
          <strong>admin123</strong></small>
      </p>
    </ion-text>
  </div>
</ion-content>
