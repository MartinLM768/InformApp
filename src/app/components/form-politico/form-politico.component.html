<ion-header>
  <ion-toolbar>
    <ion-title>
      {{ politico ? 'Editar Político' : 'Nuevo Político' }}
    </ion-title>

    <ion-buttons slot="end">
      <!-- sin color="light" -->
      <ion-button fill="clear" (click)="cerrar()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item fill="outline" class="ion-margin-bottom form-item">
    <ion-label position="stacked">Nombre *</ion-label>
    <ion-input [(ngModel)]="form.nombre" placeholder="Nombre del político"></ion-input>
  </ion-item>

  <ion-item fill="outline" class="ion-margin-bottom form-item">
    <ion-label position="stacked">Apellido *</ion-label>
    <ion-input [(ngModel)]="form.apellido" placeholder="Apellido del político"></ion-input>
  </ion-item>

  <ion-item fill="outline" class="ion-margin-bottom form-item">
    <ion-label position="stacked">Cargo *</ion-label>
    <ion-select [(ngModel)]="form.cargo" placeholder="Selecciona un cargo">
      <ion-select-option *ngFor="let cargo of cargos" [value]="cargo">
        {{ cargo }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item fill="outline" class="ion-margin-bottom form-item">
    <ion-label position="stacked">Partido *</ion-label>
    <ion-input [(ngModel)]="form.partido" placeholder="Partido político"></ion-input>
  </ion-item>

  <ion-item fill="outline" class="ion-margin-bottom form-item">
    <ion-label position="stacked">Departamento</ion-label>
    <ion-select [(ngModel)]="form.departamento" placeholder="Selecciona un departamento">
      <ion-select-option *ngFor="let dept of departamentos" [value]="dept">
        {{ dept }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item fill="outline" class="ion-margin-bottom form-item">
    <ion-label position="stacked">Email</ion-label>
    <ion-input [(ngModel)]="form.email" type="email" placeholder="email@example.com"></ion-input>
  </ion-item>

  <ion-item fill="outline" class="ion-margin-bottom form-item">
    <ion-label position="stacked">Teléfono</ion-label>
    <ion-input [(ngModel)]="form.telefono" type="tel" placeholder="+57 300 000 0000"></ion-input>
  </ion-item>

  <ion-item fill="outline" class="ion-margin-bottom form-item">
    <ion-label position="stacked">Foto (URL)</ion-label>
    <ion-input [(ngModel)]="form.foto_url" placeholder="https://example.com/foto.jpg"></ion-input>
  </ion-item>

  <ion-item fill="outline" class="ion-margin-bottom form-item">
    <ion-label position="stacked">Inicio de mandato</ion-label>
    <ion-input [(ngModel)]="form.fecha_inicio" type="date"></ion-input>
  </ion-item>

  <ion-item fill="outline" class="ion-margin-bottom form-item">
    <ion-label position="stacked">Biografía</ion-label>
    <ion-textarea [(ngModel)]="form.bio" rows="4" placeholder="Biografía del político"></ion-textarea>
  </ion-item>

  <!-- Acción principal -->
  <ion-button expand="block" color="medium" fill="outline" (click)="guardar()">
    {{ politico ? 'Actualizar' : 'Crear' }}
  </ion-button>

  <!-- Acción destructiva -->
  <ion-button *ngIf="politico" expand="block" color="danger" (click)="confirmarEliminar()">
    <ion-icon name="trash-outline" slot="start"></ion-icon>
    Eliminar político
  </ion-button>

  <!-- Acción secundaria -->
  <ion-button expand="block" fill="outline" (click)="cerrar()">
    Cancelar
  </ion-button>

</ion-content>
