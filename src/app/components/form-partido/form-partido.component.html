<ion-header>
  <ion-toolbar>
    <ion-title>{{ partido ? 'Editar Partido' : 'Nuevo Partido' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="cerrar()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item fill="outline" class="form-item">
    <ion-label position="stacked">Nombre *</ion-label>
    <ion-input [(ngModel)]="form.nombre" placeholder="Ej: Partido Liberal Colombiano"></ion-input>
  </ion-item>

  <ion-item fill="outline" class="form-item">
    <ion-label position="stacked">Siglas</ion-label>
    <ion-input [(ngModel)]="form.siglas" placeholder="Ej: PLC" maxlength="10"></ion-input>
  </ion-item>

  <ion-item fill="outline" class="form-item color-item">
    <ion-label position="stacked">Color del partido</ion-label>
    <div class="color-row">
      <div class="color-preview" [style.background]="form.color_hex"></div>
      <ion-input [(ngModel)]="form.color_hex" placeholder="#000000" maxlength="7"></ion-input>
      <input type="color" class="color-picker-native" [(ngModel)]="form.color_hex" title="Seleccionar color" />
    </div>
  </ion-item>

  <ion-item fill="outline" class="form-item">
    <ion-label position="stacked">Ideología</ion-label>
    <ion-input [(ngModel)]="form.ideologia" placeholder="Ej: Centro-izquierda"></ion-input>
  </ion-item>

  <ion-item fill="outline" class="form-item">
    <ion-label position="stacked">Sitio web</ion-label>
    <ion-input [(ngModel)]="form.sitio_web" placeholder="https://..."></ion-input>
  </ion-item>

  <ion-item fill="outline" class="form-item">
    <ion-label position="stacked">Logo (URL)</ion-label>
    <ion-input [(ngModel)]="form.logo_url" placeholder="https://..."></ion-input>
  </ion-item>

  <ion-item class="form-item toggle-item">
    <ion-label>Partido activo</ion-label>
    <ion-toggle [(ngModel)]="form.activo" color="primary" slot="end"></ion-toggle>
  </ion-item>

  <div class="buttons-group">
    <ion-button expand="block" color="primary" (click)="guardar()">
      {{ partido ? 'Guardar cambios' : 'Crear partido' }}
    </ion-button>
    <ion-button *ngIf="partido" expand="block" color="danger" fill="outline" (click)="confirmarEliminar()">
      <ion-icon name="trash-outline" slot="start"></ion-icon>
      Eliminar partido
    </ion-button>
    <ion-button expand="block" fill="clear" color="medium" (click)="cerrar()">
      Cancelar
    </ion-button>
  </div>

</ion-content>
