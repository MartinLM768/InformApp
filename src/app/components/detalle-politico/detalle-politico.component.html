<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Perfil</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrar()" color="light">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Foto -->
  <div class="header-image">
    <img
      [src]="politico.foto_url || 'assets/placeholder.png'"
      [alt]="politico.nombre"
    />
  </div>

  <div class="ion-padding">
    <!-- Info básica -->
    <ion-card>
      <ion-card-content>
        <h1 class="name">{{ politico.nombre }} {{ politico.apellido }}</h1>
        <p class="cargo" *ngIf="politico.cargo_nombre">{{ politico.cargo_nombre }}</p>
        <p class="partido" *ngIf="politico.partido_nombre">{{ politico.partido_nombre }}</p>

        <div class="chips-container">
          <ion-chip *ngIf="politico.entidad_nombre">
            <ion-icon name="location-outline"></ion-icon>
            <ion-label>{{ politico.entidad_nombre }}</ion-label>
          </ion-chip>
        </div>
      </ion-card-content>
    </ion-card>

    <!-- Biografía -->
    <ion-card *ngIf="politico.bio">
      <ion-card-header>
        <ion-card-title>Biografía</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <p>{{ politico.bio }}</p>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
