<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Perfil</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrar()" color="light">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Header con foto -->
  <div class="header-image">
    <img
      [src]="politico.foto || 'assets/placeholder.png'"
      [alt]="politico.nombre"
    />
  </div>

  <div class="ion-padding">
    <!-- Información básica -->
    <ion-card>
      <ion-card-content>
        <h1 class="name">{{ politico.nombre }} {{ politico.apellido }}</h1>
        <p class="cargo">{{ politico.cargo }}</p>
        <p class="partido" *ngIf="politico.partido">
          {{ politico.partido }}
        </p>

        <!-- Chips de información -->
        <div class="chips-container">
          <ion-chip *ngIf="politico.departamento">
            <ion-icon name="location-outline"></ion-icon>
            <ion-label>{{ politico.departamento }}</ion-label>
          </ion-chip>
          <ion-chip *ngIf="politico.fechaInicio">
            <ion-label>{{ politico.fechaInicio }}</ion-label>
          </ion-chip>
        </div>
      </ion-card-content>
    </ion-card>

    <!-- Contacto -->
    <ion-card *ngIf="politico.email || politico.telefono">
      <ion-card-header>
        <ion-card-title>Contacto</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <div class="contact-item" *ngIf="politico.email">
          <ion-icon name="mail-outline"></ion-icon>
          <div>
            <p class="label">Email</p>
            <p class="value">{{ politico.email }}</p>
          </div>
        </div>
        <div class="contact-item" *ngIf="politico.telefono">
          <ion-icon name="call-outline"></ion-icon>
          <div>
            <p class="label">Teléfono</p>
            <p class="value">{{ politico.telefono }}</p>
          </div>
        </div>
      </ion-card-content>
    </ion-card>

    <!-- Biografía -->
    <ion-card *ngIf="politico.bio">
      <ion-card-header>
        <ion-card-title>Biografía</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <p>{{ politico.bio }}</p>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
