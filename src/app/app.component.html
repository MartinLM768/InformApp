<ion-app>

  <ion-menu contentId="main-content" menuId="main-menu" type="overlay">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title class="menu-title">
          Inform<span class="menu-title-app">App</span>
        </ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content class="menu-content">

      <div class="menu-section-label">Explorar</div>

      <ion-list lines="none">
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/home" routerLinkActive="active-link" detail="false" button>
            <ion-icon name="information-circle-outline" slot="start"></ion-icon>
            <ion-label>Nosotros</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/politicos" routerLinkActive="active-link" detail="false" button>
            <ion-icon name="people-outline" slot="start"></ion-icon>
            <ion-label>Políticos</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/partidos" routerLinkActive="active-link" detail="false" button>
            <ion-icon name="flag-outline" slot="start"></ion-icon>
            <ion-label>Partidos</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/candidatos" routerLinkActive="active-link" detail="false" button>
            <ion-icon name="podium-outline" slot="start"></ion-icon>
            <ion-label>Candidatos 2026</ion-label>
            <ion-badge color="secondary" slot="end">2026</ion-badge>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>

      <div class="menu-divider"></div>
      <div class="menu-section-label">Cuenta</div>

      <ion-list lines="none">
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/login" routerLinkActive="active-link" detail="false" button>
            <ion-icon name="settings-outline" slot="start"></ion-icon>
            <ion-label>Administración</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>

    </ion-content>

    <ion-footer class="menu-footer">
      <p>InformApp · Colombia 🇨🇴</p>
      <p class="menu-footer-sub">Centralizatio</p>
    </ion-footer>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-app>
